services:
  postgres:
    image: postgres:16
    container_name: pourhouse-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: pourhouse
    ports:
      - "5432:5432"
    volumes:
      - pourhouse-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pourhouse"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pourhouse-postgres-data:
